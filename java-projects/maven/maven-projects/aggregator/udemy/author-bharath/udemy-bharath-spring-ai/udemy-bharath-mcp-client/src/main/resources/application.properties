server.port=9292
spring.application.name=udemy-bharath-mcp-client

# ===============================
# Anthropic / Claude
# ===============================
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.model=claude-sonnet-4-6
spring.ai.anthropic.chat.temperature=0.7
spring.ai.anthropic.chat.max-tokens=1024

# ===============================
# Spring AI MCP Client (HTTP)
# ===============================
spring.ai.mcp.client.streamable-http.connections.demoServer.url=http://127.0.0.1:9191